name: Publish

on:
  release:
    types: [released]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm build

      - name: Determine package filter
        id: pkg
        run: |
          TAG="${GITHUB_REF_NAME}"
          if [[ "$TAG" == *"signature-kit-react"* ]]; then
            echo "filter=@tinyforged/signature-kit-react" >> "$GITHUB_OUTPUT"
          elif [[ "$TAG" == *"signature-kit-vue"* ]]; then
            echo "filter=@tinyforged/signature-kit-vue" >> "$GITHUB_OUTPUT"
          elif [[ "$TAG" == *"signature-kit-v0"* ]]; then
            echo "filter=@tinyforged/signature-kit" >> "$GITHUB_OUTPUT"
          else
            echo "filter=" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish
        if: steps.pkg.outputs.filter != ''
        run: pnpm --filter ${{ steps.pkg.outputs.filter }} publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
