name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (e.g. 1.2.0)"
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm test

      - name: Bump versions
        run: |
          pnpm --filter @tinyforged/signature-kit exec -- node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json','utf8'));
            pkg.version = '${{ inputs.version }}';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "
          pnpm --filter @tinyforged/signature-kit-react exec -- node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json','utf8'));
            pkg.version = '${{ inputs.version }}';
            pkg.dependencies['@tinyforged/signature-kit'] = '^\${{ inputs.version }}';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "
          pnpm --filter @tinyforged/signature-kit-vue exec -- node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json','utf8'));
            pkg.version = '${{ inputs.version }}';
            pkg.dependencies['@tinyforged/signature-kit'] = '^\${{ inputs.version }}';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "
          pnpm install --no-frozen-lockfile

      - name: Publish to npm
        run: pnpm -r --filter "./packages/*" publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add packages/*/package.json pnpm-lock.yaml
          git commit -m "chore: release v${{ inputs.version }}"

      - name: Create tag and release
        run: |
          git tag "v${{ inputs.version }}"
          git push origin main --tags
          gh release create "v${{ inputs.version }}" \
            --title "v${{ inputs.version }}" \
            --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
